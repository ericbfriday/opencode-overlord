name: Orchestrate Agents

on:
  repository_dispatch:
    types:
      - trigger-jules
      - trigger-copilot
      - trigger-opencode
      - trigger-all
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to trigger (jules, copilot)'
        required: true
        default: 'jules'
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
      task:
        description: 'Task description for the agent'
        required: true
  pull_request:
    types: [opened, synchronize, closed]
  merge_group:
    types: [checks_requested]

concurrency:
  group: orchestrate-${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Determine agent inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            EVENT_TYPE="${{ github.event.action }}"
            if [[ "$EVENT_TYPE" == trigger-* ]]; then
              AGENT="${EVENT_TYPE#trigger-}"
            else
              AGENT="jules"
            fi
            TARGET_REPO="${{ github.event.client_payload.target_repo }}"
            TASK="${{ github.event.client_payload.task }}"
          else
            AGENT="${{ github.event.inputs.agent }}"
            TARGET_REPO="${{ github.event.inputs.target_repo }}"
            TASK="${{ github.event.inputs.task }}"
          fi
          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT
          echo "task=$TASK" >> $GITHUB_OUTPUT

      - name: Dispatch task to agent
        env:
          OVERLORD_GITHUB_TOKEN: ${{ secrets.OVERLORD_GITHUB_TOKEN }}
          OVERLORD_JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          AGENT: ${{ steps.inputs.outputs.agent }}
          TARGET_REPO: ${{ steps.inputs.outputs.target_repo }}
          TASK: ${{ steps.inputs.outputs.task }}
        run: |
          uv run python -m overlord.cli dispatch \
            --agent "$AGENT" \
            --repo "$TARGET_REPO" \
            --task "$TASK"

  merge-order:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Compute merge order
        env:
          OVERLORD_GITHUB_TOKEN: ${{ secrets.OVERLORD_GITHUB_TOKEN }}
        run: |
          uv run python -m overlord.cli merge-order \
            --repo "${{ github.repository }}"
